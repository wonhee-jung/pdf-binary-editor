version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pdf-binary-editor-backend
    working_dir: /app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      APP_APP_ENV: development
      APP_DATA_DIR: /app/.data
      APP_CORS_ENABLED: "true"
      APP_CORS_ALLOW_ORIGINS: "http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173"
      APP_CORS_ALLOW_CREDENTIALS: "true"
    volumes:
      - ./backend:/app
